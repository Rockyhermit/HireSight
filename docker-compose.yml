services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: hiresphere_user
      POSTGRES_PASSWORD: hiresphere123
      POSTGRES_DB: jobtracker
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    environment:
      DATABASE_URL: postgresql://hiresphere_user:hiresphere123@db:5432/jobtracker
      XAI_API_KEY: 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
      XAI_BASE_URL: https://api.groq.com/openai/v1
      SECRET_KEY: hiresphere-super-secret-key-2026
    depends_on:
      - db

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
